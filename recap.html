<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prenota - Cervinia Ski Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="container" style="max-width:900px;">
            <div style="margin-bottom: 20px;">
                <a href="index.html" class="btn-back-link">
                    <i class="fas fa-arrow-left"></i> TORNA ALLA GALLERY
                </a>
            </div>

            <div class="material-card">
                <h1 style="text-align:center; color:#00e5ff; margin-bottom:30px;">PRENOTAZIONE</h1>
                
                <div class="form-grid-recap">
                    <div class="input-group"><label>Nome</label><input type="text" id="fName" class="input-f"></div>
                    <div class="input-group"><label>Cognome</label><input type="text" id="fSurname" class="input-f"></div>
                    <div class="input-group"><label>Email</label><input type="email" id="fEmail" class="input-f"></div>
                    <div class="input-group"><label>Telefono</label><input type="tel" id="fPhone" class="input-f"></div>
                </div>

                <div class="guest-selector-recap">
                    <div class="g-type"><span>Adulti</span><div class="g-ctrl"><button onclick="setGuests('ad', -1)">-</button><b id="valAd">2</b><button onclick="setGuests('ad', 1)">+</button></div></div>
                    <div class="g-type"><span>Bambini</span><div class="g-ctrl"><button onclick="setGuests('ch', -1)">-</button><b id="valCh">0</b><button onclick="setGuests('ch', 1)">+</button></div></div>
                </div>

                <div class="cal-section">
                    <div class="cal-nav-recap">
                        <button onclick="shiftMonth(-1)">❮ Mese Prec.</button>
                        <button onclick="shiftMonth(1)">Mese Succ. ❯</button>
                    </div>
                    <div id="calendar-render" class="calendar-dual"></div>
                </div>

                <div class="price-summary">
                    <p style="color:#2ecc71; font-weight:800; text-align:center;">✓ Pulizie incluse</p>
                    <div id="oldPrice" class="p-old"></div>
                    <div id="totalPrice" class="p-new">Seleziona le date sul calendario</div>
                    <p id="txtSave" style="color:#2ecc71; font-weight:600; display:none; text-align:center;">Risparmio prenotazione diretta!</p>
                    <a href="#" id="waBtn" class="btn-wa">CONFERMA E INVIA SU WHATSAPP</a>
                </div>
            </div>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
