<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prenota - Cervinia Ski Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="container" style="max-width:900px;">
            <div style="margin-bottom: 25px;">
                <a href="index.html" class="btn-back-link" style="color:white; text-decoration:none;">
                    <i class="fas fa-arrow-left"></i> <span class="lang-txt" data-it="TORNA ALLA GALLERY" data-en="BACK TO GALLERY">TORNA ALLA GALLERY</span>
                </a>
            </div>

            <div class="material-card">
                <h1 style="text-align:center; color:#00e5ff; margin-bottom:30px;" class="lang-txt" data-it="PRENOTAZIONE" data-en="BOOKING">PRENOTAZIONE</h1>
                
                <!-- 1. CALENDARIO PRIMA -->
                <div class="cal-section">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <button onclick="shiftMonth(-1)" class="material-card" style="padding:10px 20px; cursor:pointer;">❮</button>
                        <button onclick="shiftMonth(1)" class="material-card" style="padding:10px 20px; cursor:pointer;">❯</button>
                    </div>
                    <div id="calendar-render" class="calendar-dual"></div>
                </div>

                <!-- 2. OSPITI -->
                <div style="display:flex; gap:20px; margin:30px 0;">
                    <div class="material-card" style="flex:1; text-align:center;">
                        <span class="lang-txt" data-it="Adulti" data-en="Adults">Adulti</span><br>
                        <button onclick="setGuests('ad', -1)">-</button> <b id="valAd">2</b> <button onclick="setGuests('ad', 1)">+</button>
                    </div>
                    <div class="material-card" style="flex:1; text-align:center;">
                        <span class="lang-txt" data-it="Bambini" data-en="Children">Bambini</span><br>
                        <button onclick="setGuests('ch', -1)">-</button> <b id="valCh">0</b> <button onclick="setGuests('ch', 1)">+</button>
                    </div>
                </div>

                <!-- 3. DATI SOTTO -->
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <input type="text" id="fName" class="input-f" placeholder="Nome / Name">
                    <input type="text" id="fSurname" class="input-f" placeholder="Cognome / Surname">
                    <input type="email" id="fEmail" class="input-f" placeholder="Email">
                    <input type="tel" id="fPhone" class="input-f" placeholder="Telefono / Phone">
                </div>

                <div class="price-summary">
                    <div id="oldPrice" class="p-old"></div>
                    <div id="totalPrice" class="p-new">...</div>
                    <div class="policy-box" style="text-align:center; opacity:0.8; font-size:14px;">
                        <span class="lang-txt" data-it="Acconto richiesto (30%):" data-en="Required Deposit (30%):">Acconto richiesto:</span> <b id="depositTxt">0€</b>
                    </div>
                    <button id="mainConfirmBtn" onclick="confirmBooking()" class="btn-wa">
                        <span class="lang-txt" data-it="INVIA RICHIESTA" data-en="SEND REQUEST">INVIA RICHIESTA</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
