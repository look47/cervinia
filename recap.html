<!DOCTYPE html>
<html lang="it">
<head>
    <title>Prenota - Rododendro Ski-In Ski-Out</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tasto Back Laterale -->
    <a href="index.html" class="btn-back-side">
        <i class="fas fa-chevron-left"></i>
        <span class="lang-txt" data-it="GALLERY" data-en="HOME">GALLERY</span>
    </a>

    <!-- Lingue Fisse -->
    <div class="top-lang-selector">
        <span id="lang-it" onclick="setLanguage('it')">🇮🇹</span>
        <span id="lang-en" onclick="setLanguage('en')">🇬🇧</span>
    </div>

    <div class="main-wrapper">
        <div class="container" style="max-width:900px;">
            
            <div class="material-card" style="margin-top: 40px;">
                <h1 style="text-align:center; color:var(--accent); margin-bottom:40px; font-weight:800;" class="lang-txt" data-it="PRENOTA IL TUO SOGGIORNO" data-en="BOOK YOUR STAY">PRENOTA IL TUO SOGGIORNO</h1>
                
                <!-- 1. CALENDARIO -->
                <div class="cal-section">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <button onclick="shiftMonth(-1)" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="shiftMonth(1)" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div id="calendar-render" class="calendar-dual"></div>
                </div>

                <!-- 2. SCIATORI STILIZZATI (Ospiti) -->
                <div class="skier-count-box">
                    <div class="skier-ctrl">
                        <i class="fas fa-skier skier-icon"></i>
                        <div style="text-align:center">
                            <button onclick="setGuests('ad', -1)" style="background:none; border:none; color:white; cursor:pointer;">-</button>
                            <b id="valAd" style="margin:0 10px; font-size:20px;">2</b>
                            <button onclick="setGuests('ad', 1)" style="background:none; border:none; color:white; cursor:pointer;">+</button>
                            <div style="font-size:10px; opacity:0.5;" class="lang-txt" data-it="ADULTI" data-en="ADULTS">ADULTI</div>
                        </div>
                    </div>
                    <div class="skier-ctrl">
                        <i class="fas fa-skier skier-icon child"></i>
                        <div style="text-align:center">
                            <button onclick="setGuests('ch', -1)" style="background:none; border:none; color:white; cursor:pointer;">-</button>
                            <b id="valCh" style="margin:0 10px; font-size:20px;">0</b>
                            <button onclick="setGuests('ch', 1)" style="background:none; border:none; color:white; cursor:pointer;">+</button>
                            <div style="font-size:10px; opacity:0.5;" class="lang-txt" data-it="BAMBINI" data-en="CHILDREN">BAMBINI</div>
                        </div>
                    </div>
                </div>

                <!-- 3. DATI OSPITE (BOX STILIZZATI) -->
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:40px;">
                    <div class="input-group-recap"><input type="text" id="fName" class="input-f-recap" placeholder="Nome / First Name"></div>
                    <div class="input-group-recap"><input type="text" id="fSurname" class="input-f-recap" placeholder="Cognome / Last Name"></div>
                    <div class="input-group-recap"><input type="email" id="fEmail" class="input-f-recap" placeholder="Email"></div>
                    <div class="input-group-recap"><input type="tel" id="fPhone" class="input-f-recap" placeholder="Telefono / Phone"></div>
                </div>

                <!-- 4. RIEPILOGO MARKETING -->
                <div class="price-marketing-box">
                    <div id="oldPrice" class="p-old-recap"></div>
                    <div id="totalPrice" class="p-new-recap">...</div>
                    <div id="promoBadge" class="promo-badge" style="display:none;">
                        <span class="lang-txt" data-it="OFFERTA STAGIONALE" data-en="SEASONAL OFFER">OFFERTA STAGIONALE</span>
                    </div>
                    
                    <div style="margin-top:20px; font-size:14px; opacity:0.8;">
                        <span class="lang-txt" data-it="Acconto richiesto (30%):" data-en="Deposit required (30%):">Acconto richiesto:</span> 
                        <b id="depositTxt" style="color:var(--accent)">0€</b>
                    </div>

                    <button id="mainConfirmBtn" onclick="confirmBooking()" class="btn-wa" style="margin-top:30px;">
                        <span class="lang-txt" data-it="CONFERMA E INVIA" data-en="CONFIRM AND SEND">CONFERMA E INVIA</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
