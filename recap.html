<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Riepilogo - Cervinia Ski Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay">
        <div class="container" style="max-width:500px; padding-top:100px;">
            <div class="material-card" style="text-align:center;">
                <h1>Prenotazione</h1>
                <p>Arrivo: <b id="resIn"></b> | Partenza: <b id="resOut"></b></p>
                <p>Durata: <b id="resNights"></b> notti</p>
                <p style="color:#2ecc71; font-weight:800;">✓ Pulizie incluse</p>
                <hr>
                <p>Prezzo Originale: <span style="text-decoration:line-through; opacity:0.6;" id="resOld"></span>€</p>
                <div style="font-size: 50px; color:#00e5ff; font-weight:800;" id="resTotal"></div>
                <p style="color:#2ecc71;">Risparmi il 13% prenotando qui!</p>
                
                <a href="#" id="waLink" style="display:block; background:#25D366; color:white; padding:15px; border-radius:10px; text-decoration:none; font-weight:bold; margin-top:20px;">CONFERMA SU WHATSAPP</a>
                <a href="index.html" style="color:white; display:block; margin-top:15px; opacity:0.6;">Annulla</a>
            </div>
        </div>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById("resIn").innerText = p.get("in");
        document.getElementById("resOut").innerText = p.get("out");
        document.getElementById("resNights").innerText = p.get("nights");
        document.getElementById("resOld").innerText = p.get("old");
        document.getElementById("resTotal").innerText = p.get("total") + "€";
        
        const msg = `Ciao! Vorrei prenotare.%0AIn: ${p.get("in")}%0AOut: ${p.get("out")}%0ATotale: ${p.get("total")}€`;
        document.getElementById("waLink").href = `https://wa.me/393479612836?text=${msg}`;
    </script>
</body>
</html>
