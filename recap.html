<!DOCTYPE html>
<html lang="it">
<head>
    <title>Prenota - Rododendro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tasto HOME Verticale -->
    <a href="index.html" class="btn-back-side">
        <i class="fas fa-house-chimney-window" style="font-size: 24px;"></i>
        <div class="home-text"><span>H</span><span>O</span><span>M</span><span>E</span></div>
    </a>

    <div class="main-wrapper">
        <div class="container" style="max-width:1000px;">
            
            <div class="material-card" style="margin-top: 30px;">
                <h1 style="text-align:center; color:var(--accent); margin-bottom:40px; font-weight:800;">RODODENDRO RESERVATION</h1>
                
                <div class="recap-main-grid">
                    <!-- SINISTRA: CALENDARIO -->
                    <div class="cal-section" style="margin:0;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                            <button onclick="shiftMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-chevron-left"></i></button>
                            <button onclick="shiftMonth(1)" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <div id="calendar-render" class="calendar-dual"></div>
                    </div>

                    <!-- DESTRA: OSPITI (SCIATORI) -->
                    <aside class="skier-aside">
                        <div class="skier-ctrl">
                            <i class="fas fa-skier skier-icon"></i>
                            <div style="font-size:12px; opacity:0.6; margin-bottom:10px;">ADULTI</div>
                            <div style="display:flex; justify-content:center; align-items:center; gap:20px;">
                                <button onclick="setGuests('ad', -1)" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">-</button>
                                <b id="valAd" style="font-size:24px;">2</b>
                                <button onclick="setGuests('ad', 1)" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">+</button>
                            </div>
                        </div>
                        <div class="skier-ctrl">
                            <i class="fas fa-skier skier-icon child"></i>
                            <div style="font-size:12px; opacity:0.6; margin-bottom:10px;">BAMBINI</div>
                            <div style="display:flex; justify-content:center; align-items:center; gap:20px;">
                                <button onclick="setGuests('ch', -1)" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">-</button>
                                <b id="valCh" style="font-size:24px;">0</b>
                                <button onclick="setGuests('ch', 1)" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">+</button>
                            </div>
                        </div>
                        <div style="font-size:11px; text-align:center; opacity:0.5;">* Max 6 ospiti totali</div>
                    </aside>
                </div>

                <!-- DATI OSPITE -->
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:40px;">
                    <input type="text" id="fName" class="input-f-recap" placeholder="Nome">
                    <input type="text" id="fSurname" class="input-f-recap" placeholder="Cognome">
                    <input type="email" id="fEmail" class="input-f-recap" placeholder="Email">
                    <input type="tel" id="fPhone" class="input-f-recap" placeholder="Telefono">
                </div>

                <!-- PREZZO E INVIO -->
                <div style="text-align:center; margin-top:40px; padding-top:30px; border-top:1px solid rgba(255,255,255,0.1);">
                    <div id="oldPrice" class="p-old-recap"></div>
                    <div id="totalPrice" class="p-new-recap">...</div>
                    <div style="font-size:14px; margin-top:10px; opacity:0.8;">Acconto richiesto: <b id="depositTxt" style="color:var(--accent)">0€</b></div>
                    
                    <button id="mainConfirmBtn" onclick="confirmBooking()" class="btn-confirm-premium lang-txt" data-it="CONFERMA E PRENOTA" data-en="CONFIRM AND BOOK">
                        CONFERMA E PRENOTA
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
