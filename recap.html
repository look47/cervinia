<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prenota - Cervinia Ski Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-content" style="margin-left:0;">
        <div class="container" style="max-width:800px;">
            <div class="material-card" style="margin-top:20px;">
                <h1 style="text-align:center; color:#00e5ff;">PRENOTAZIONE</h1>
                
                <!-- DATI UTENTE -->
                <div class="form-grid">
                    <input type="text" id="fName" placeholder="Nome" class="input-field">
                    <input type="text" id="fSurname" placeholder="Cognome" class="input-field">
                    <input type="email" id="fEmail" placeholder="Email" class="input-field">
                    <input type="tel" id="fPhone" placeholder="Telefono" class="input-field">
                </div>

                <!-- OSPITI -->
                <div class="guest-picker" style="margin-top:20px;">
                    <div class="picker-row">
                        <span id="lblAd">Adulti</span>
                        <div class="picker-ctrl">
                            <button onclick="setGuests('ad', -1)">-</button>
                            <span id="valAd">2</span>
                            <button onclick="setGuests('ad', 1)">+</button>
                        </div>
                    </div>
                    <div class="picker-row">
                        <span id="lblCh">Bambini</span>
                        <div class="picker-ctrl">
                            <button onclick="setGuests('ch', -1)">-</button>
                            <span id="valCh">0</span>
                            <button onclick="setGuests('ch', 1)">+</button>
                        </div>
                    </div>
                </div>

                <!-- CALENDARIO -->
                <div class="cal-nav-recap">
                    <button onclick="shiftMonth(-1)">❮</button>
                    <button onclick="shiftMonth(1)">❯</button>
                </div>
                <div id="calendar-render" class="calendar-dual"></div>

                <!-- PREZZO E WHATSAPP -->
                <div class="price-box" style="text-align:center; margin-top:30px;">
                    <p style="color:#2ecc71; font-weight:800;">✓ Pulizie incluse</p>
                    <div id="oldPrice" style="text-decoration:line-through; opacity:0.5;"></div>
                    <div id="totalPrice" style="font-size:48px; color:#00e5ff; font-weight:800;">Scegli le date</div>
                    <a href="#" id="waBtn" class="btn-whatsapp">CONFERMA SU WHATSAPP</a>
                    <a href="index.html" style="display:block; margin-top:15px; color:#ccc; text-decoration:none;">Annulla e torna alla Home</a>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
