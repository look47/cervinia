<!DOCTYPE html>
<html lang="it">
<head>
    <title>Prenota - Rododendro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<a href="index.html" class="btn-back-side">
    <i class="fas fa-house-chimney"></i>
    <div style="font-weight:800; font-size:12px; margin-top:5px;">H<br>O<br>M<br>E</div>
</a>

<div class="main-wrapper">
    <div class="container" style="max-width:1000px;">
        <div class="material-card" style="margin-top: 30px;">
            <h1 style="text-align:center; color:var(--accent); margin-bottom:30px;">RESERVATION</h1>
            
            <div class="recap-main-grid">
                <div class="cal-section">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <button onclick="shiftMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;">❮</button>
                        <button onclick="shiftMonth(1)" style="background:none; border:none; color:white; cursor:pointer;">❯</button>
                    </div>
                    <div id="calendar-render" class="cal-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;"></div>
                </div>

                <aside>
                    <div class="skier-ctrl">
                        <i class="fas fa-skier" style="color:var(--accent); font-size:24px;"></i>
                        <div style="font-size:10px; margin:5px 0;">ADULTI</div>
                        <button onclick="setGuests('ad', -1)">-</button> <b id="valAd">2</b> <button onclick="setGuests('ad', 1)">+</button>
                    </div>
                    <div class="skier-ctrl">
                        <i class="fas fa-skier" style="color:var(--accent); font-size:18px;"></i>
                        <div style="font-size:10px; margin:5px 0;">BAMBINI</div>
                        <button onclick="setGuests('ch', -1)">-</button> <b id="valCh">0</b> <button onclick="setGuests('ch', 1)">+</button>
                    </div>
                </aside>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:30px;">
                <input type="text" id="fName" class="input-f-recap" placeholder="Nome">
                <input type="text" id="fSurname" class="input-f-recap" placeholder="Cognome">
                <input type="email" id="fEmail" class="input-f-recap" placeholder="Email">
                <input type="tel" id="fPhone" class="input-f-recap" placeholder="Telefono">
            </div>

            <div style="text-align:center; margin-top:30px;">
                <div id="oldPrice" style="text-decoration:line-through; opacity:0.4;"></div>
                <div id="totalPrice" style="font-size:40px; color:var(--accent); font-weight:800;">...</div>
                <button id="mainConfirmBtn" onclick="confirmBooking()" style="width:100%; background:var(--accent); color:black; border:none; padding:20px; border-radius:15px; font-weight:800; cursor:pointer; margin-top:20px;">CONFERMA E PRENOTA</button>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
