<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Riepilogo - Cervinia Ski Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .recap-box { max-width: 500px; margin: 100px auto; text-align: center; }
        .discount-applied { color: #2ecc71; font-size: 14px; font-weight: 800; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="container">
            <div class="recap-box material-card">
                <h1>Riepilogo</h1>
                <p>Check-in: <b><span id="resIn"></span></b></p>
                <p>Check-out: <b><span id="resOut"></span></b></p>
                <p>Notti: <b><span id="resNights"></span></b></p>
                <div id="resTotal" style="font-size: 50px; color:#00e5ff; font-weight:800; margin:20px 0;"></div>
                <div id="discountMsg" class="discount-applied">✓ Sconto 10% Prenotazione Diretta applicato!</div>
                
                <!-- Tasto WhatsApp centrato, prende stile float-btn ma lo riadattiamo per inline -->
                <a href="#" id="waLink" style="display:block; background:#25D366; color:white; padding:15px; border-radius:10px; font-weight:bold; text-decoration:none; margin-top:20px; font-size:18px;">INVIA RICHIESTA <i class="fab fa-whatsapp"></i></a>
                
                <a href="index.html" style="color:#ccc; display:block; margin-top:20px; text-decoration:none;">Torna indietro</a>
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const nights = params.get("nights");
        document.getElementById("resIn").innerText = params.get("in");
        document.getElementById("resOut").innerText = params.get("out");
        document.getElementById("resNights").innerText = nights;
        document.getElementById("resTotal").innerText = params.get("total") + "€";
        
        if (nights >= 4) {
            document.getElementById("discountMsg").style.display = "block";
        }
        
        const msg = `Ciao! Richiesta Cervinia Ski Home.%0AArrivo: ${params.get("in")}%0APartenza: ${params.get("out")}%0ANotti: ${nights}%0APrezzo: ${params.get("total")}€`;
        document.getElementById("waLink").href = `https://wa.me/393479612836?text=${msg}`;
    </script>
</body>
</html>
