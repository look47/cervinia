<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prenota - Cervinia Ski Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay">
        <div class="top-lang-bar">
            <span class="flag-icon active" id="flag-it" onclick="setLang('it')">🇮🇹</span>
            <span class="flag-icon" id="flag-en" onclick="setLang('en')">🇬🇧</span>
        </div>

        <div class="container" style="max-width:800px;">
            <div class="material-card" style="margin-top: 20px;">
                <h1 style="text-align:center; color:#00e5ff;">RESERVATION</h1>
                
                <!-- GUEST SELECTOR -->
                <div class="guest-selector">
                    <div class="guest-type">
                        <span id="lblAdults">Adulti</span>
                        <div class="ctrl">
                            <button onclick="changeGuests('adults', -1)">-</button>
                            <span id="numAdults">2</span>
                            <button onclick="changeGuests('adults', 1)">+</button>
                        </div>
                    </div>
                    <div class="guest-type">
                        <span id="lblChildren">Bambini</span>
                        <div class="ctrl">
                            <button onclick="changeGuests('children', -1)">-</button>
                            <span id="numChildren">0</span>
                            <button onclick="changeGuests('children', 1)">+</button>
                        </div>
                    </div>
                </div>

                <!-- CALENDARIO DUAL -->
                <div class="cal-header-nav" style="text-align:center; margin-bottom:15px;">
                    <button onclick="moveMonth(-1)" style="background:none; border:1px solid #00e5ff; color:white; padding:5px 15px; border-radius:5px;">❮</button>
                    <button onclick="moveMonth(1)" style="background:none; border:1px solid #00e5ff; color:white; padding:5px 15px; border-radius:5px;">❯</button>
                </div>
                <div id="calendar-grid-container" class="dual-calendar"></div>

                <!-- PREZZO E WHATSAPP -->
                <div class="price-display">
                    <p style="color:#2ecc71; font-weight:800;" id="txtClean">✓ Pulizie incluse</p>
                    <div class="price-old" id="p-old">---</div>
                    <div class="price-final" id="p-final">Scegli le date</div>
                    <p style="color:#2ecc71; font-weight:600;" id="txtSave">Risparmio prenotazione diretta!</p>
                    
                    <a href="#" id="wa-link" style="display:block; background:#25D366; color:white; padding:20px; border-radius:15px; text-decoration:none; font-weight:800; margin-top:30px; font-size:20px; box-shadow: 0 4px 15px rgba(37,211,102,0.4);">
                        CONFIRM VIA WHATSAPP
                    </a>
                    <a href="index.html" style="color:white; display:block; margin-top:20px; opacity:0.5; text-decoration:none; text-align:center;">Torna alla Home</a>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
