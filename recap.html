<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prenota - Cervinia Ski Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="container" style="max-width:850px;">
            <div class="material-card" style="margin-top:20px;">
                <h1 style="text-align:center; color:#00e5ff;">PRENOTAZIONE</h1>
                
                <!-- DATI UTENTE -->
                <div class="form-grid">
                    <input type="text" id="fName" placeholder="Nome" class="input-f">
                    <input type="text" id="fSurname" placeholder="Cognome" class="input-f">
                    <input type="email" id="fEmail" placeholder="Email" class="input-f">
                    <input type="tel" id="fPhone" placeholder="Telefono" class="input-f">
                </div>

                <!-- OSPITI -->
                <div class="guest-selector">
                    <div class="g-type">
                        <span id="lblAd">Adulti</span>
                        <div class="g-ctrl">
                            <button onclick="setGuests('ad', -1)">-</button>
                            <span id="valAd">2</span>
                            <button onclick="setGuests('ad', 1)">+</button>
                        </div>
                    </div>
                    <div class="g-type">
                        <span id="lblCh">Bambini</span>
                        <div class="g-ctrl">
                            <button onclick="setGuests('ch', -1)">-</button>
                            <span id="valCh">0</span>
                            <button onclick="setGuests('ch', 1)">+</button>
                        </div>
                    </div>
                </div>

                <!-- CALENDARIO -->
                <div class="cal-nav-recap">
                    <button onclick="shiftMonth(-1)">❮ Mese Prec.</button>
                    <button onclick="shiftMonth(1)">Mese Succ. ❯</button>
                </div>
                <div id="calendar-render" class="calendar-dual"></div>

                <!-- RIEPILOGO PREZZO -->
                <div class="price-summary">
                    <p style="color:#2ecc71; font-weight:800;">✓ Pulizie incluse</p>
                    <div id="oldPrice" class="p-old"></div>
                    <div id="totalPrice" class="p-new">Seleziona le date</div>
                    <p id="txtSave" style="color:#2ecc71; font-weight:600; display:none;">Risparmio prenotazione diretta!</p>
                    
                    <a href="#" id="waBtn" class="btn-wa">CONFERMA E INVIA SU WHATSAPP</a>
                    <a href="index.html" style="display:block; margin-top:20px; color:#ccc; text-decoration:none;">Torna alla Home</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Carichiamo prima la configurazione, poi lo script -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
