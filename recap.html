<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Recap - Cervinia Ski Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); padding: 40px; border-radius: 25px; text-align: center; max-width: 450px; border: 1px solid #00e5ff; }
        .price { font-size: 56px; font-weight: 800; color: #00e5ff; margin: 20px 0; }
        .old { text-decoration: line-through; opacity: 0.5; font-size: 18px; }
        .btn { display: block; background: #25D366; color: white; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 800; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="t"></h1>
        <p id="d"></p> <p id="g"></p>
        <p style="color:#2ecc71; font-weight:800;" id="c"></p>
        <hr style="opacity:0.2; margin:20px 0;">
        <div class="old" id="o"></div>
        <div class="price" id="p"></div>
        <p style="color:#2ecc71;" id="s"></p>
        <a href="#" id="w" class="btn">WHATSAPP</a>
        <a href="index.html" style="color:white; display:block; margin-top:20px; opacity:0.5; text-decoration:none;">Annulla</a>
    </div>
    <script>
        const u = new URLSearchParams(window.location.search);
        const l = u.get("l") || "it";
        const txt = {
            it: { t: "Riepilogo", ad: "Adulti", ch: "Bambini", c: "✓ Pulizie incluse", s: "Sconto prenotazione diretta!", w: "CONFERMA SU WHATSAPP" },
            en: { t: "Recap", ad: "Adults", ch: "Children", c: "✓ Cleaning included", s: "Direct booking discount!", w: "CONFIRM ON WHATSAPP" }
        }[l];
        document.getElementById("t").innerText = txt.t;
        document.getElementById("d").innerText = `${u.get("in")} / ${u.get("out")} (${u.get("n")} notti)`;
        document.getElementById("g").innerText = `${u.get("ad")} ${txt.ad}, ${u.get("ch")} ${txt.ch}`;
        document.getElementById("c").innerText = txt.c;
        document.getElementById("o").innerText = u.get("o") + "€";
        document.getElementById("p").innerText = u.get("t") + "€";
        document.getElementById("s").innerText = txt.s;
        document.getElementById("w").innerText = txt.w;
        const msg = `Ciao! Vorrei prenotare.%0AIn: ${u.get("in")}%0AOut: ${u.get("out")}%0AOspiti: ${u.get("ad")} Ad, ${u.get("ch")} Bam.%0ATotale: ${u.get("t")}€`;
        document.getElementById("w").href = `https://wa.me/393479612836?text=${msg}`;
    </script>
</body>
</html>
