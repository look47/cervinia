<!DOCTYPE html>
<html lang="it">
<head>
    <title>Prenota - Rododendro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<a href="index.html" class="btn-back-side">
    <i class="fas fa-house-chimney-window" style="font-size: 22px;"></i>
    <div style="font-weight:800; font-size:13px; margin-top:8px; line-height:1.2; text-align:center;">H<br>O<br>M<br>E</div>
</a>

<div class="main-wrapper">
    <div class="container" style="max-width:1000px;">
        
        <div class="material-card" style="margin-top: 20px;">
            <img src="sfondo_nero.webp" class="card-bg-logo">

            <h1 class="recap-title" style="text-align:center; color:var(--accent); font-weight:800; margin:0 0 20px 0;">RESERVATION</h1>
            
            <div class="recap-main-grid">
                <div class="cal-section" style="padding:0; background:transparent;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <button onclick="shiftMonth(-1)" style="background:none; border:none; color:white; cursor:pointer; padding:5px;">❮</button>
                        <button onclick="shiftMonth(1)" style="background:none; border:none; color:white; cursor:pointer; padding:5px;">❯</button>
                    </div>
                    <div id="calendar-render"></div>
                </div>

                <aside>
                    <div class="skier-ctrl">
                        <i class="fas fa-skier" style="color:var(--accent); font-size:22px;"></i>
                        <div style="font-size:10px; margin:3px 0; font-weight:800; opacity:0.7;">ADULTI</div>
                        <div style="display:flex; justify-content:center; align-items:center; gap:15px;">
                            <button onclick="setGuests('ad', -1)" style="background:none; border:none; color:white; cursor:pointer; font-size:18px;">-</button>
                            <b id="valAd" style="font-size:20px;">2</b>
                            <button onclick="setGuests('ad', 1)" style="background:none; border:none; color:white; cursor:pointer; font-size:18px;">+</button>
                        </div>
                    </div>
                    <div class="skier-ctrl">
                        <i class="fas fa-skier" style="color:var(--accent); font-size:16px;"></i>
                        <div style="font-size:10px; margin:3px 0; font-weight:800; opacity:0.7;">BAMBINI</div>
                        <div style="display:flex; justify-content:center; align-items:center; gap:15px;">
                            <button onclick="setGuests('ch', -1)" style="background:none; border:none; color:white; cursor:pointer; font-size:18px;">-</button>
                            <b id="valCh" style="font-size:20px;">0</b>
                            <button onclick="setGuests('ch', 1)" style="background:none; border:none; color:white; cursor:pointer; font-size:18px;">+</button>
                        </div>
                    </div>
                    <div style="font-size:10px; text-align:center; opacity:0.5;">Max 6 ospiti totali</div>
                </aside>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:20px;">
                <input type="text" id="fName" class="input-f-recap" placeholder="Nome">
                <input type="text" id="fSurname" class="input-f-recap" placeholder="Cognome">
                <input type="email" id="fEmail" class="input-f-recap" placeholder="Email">
                <input type="tel" id="fPhone" class="input-f-recap" placeholder="Telefono">
            </div>

            <div class="price-section-recap" style="text-align:center;">
                <div id="oldPrice" style="text-decoration:line-through; opacity:0.4; font-size:16px; margin-bottom:-5px;"></div>
                <div id="totalPrice" style="font-size:42px; color:var(--accent); font-weight:800; line-height:1;">...</div>
                <div style="font-size:13px; opacity:0.7; margin:5px 0 15px 0;">Acconto richiesto (30%): <b id="depositTxt">0€</b></div>
                <button id="mainConfirmBtn" onclick="confirmBooking()" class="btn-confirm-premium">
                    CONFERMA E PRENOTA
                </button>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
