<!DOCTYPE html>
<html lang="it">
<head>
    <title>Cervinia Ski Home</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="sidebar-trigger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

<nav class="sidebar" id="sidebar">
    <button class="close-sidebar" onclick="toggleSidebar()">&times;</button>
    <h2 style="color:var(--accent)">CERVINIA<br>SKI HOME</h2>
    <ul class="nav-links">
        <li><a href="#info" onclick="toggleSidebar()"><i class="fas fa-home"></i> <span class="lang-txt" data-it="Appartamento" data-en="Apartment">Appartamento</span></a></li>
        <li><a href="#foto" onclick="toggleSidebar()"><i class="fas fa-images"></i> <span class="lang-txt" data-it="Gallery" data-en="Gallery">Gallery</span></a></li>
        <li><a href="#recensioni" onclick="toggleSidebar()"><i class="fas fa-star"></i> <span class="lang-txt" data-it="Recensioni" data-en="Reviews">Recensioni</span></a></li>
        <li><a href="recap.html"><i class="fas fa-calendar-alt"></i> <span class="lang-txt" data-it="Prenota" data-en="Book Now">Prenota</span></a></li>
    </ul>
</nav>

<div class="main-wrapper">
    <header class="site-header">
        <h1>CERVINIA SKI HOME</h1>
        <div class="social-header">
            <a href="https://instagram.com/tuoprofilo" class="social-btn"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/393479612836" class="social-btn"><i class="fab fa-whatsapp"></i></a>
            <a href="mailto:tuaemail@gmail.com" class="social-btn"><i class="far fa-envelope"></i></a>
        </div>
        <div class="lang-selector">
            <button id="btn-it" class="lang-flag-btn" onclick="setLanguage('it')">🇮🇹</button>
            <button id="btn-en" class="lang-flag-btn" onclick="setLanguage('en')">🇬🇧</button>
        </div>
    </header>

    <div class="container">
        <div class="booking-grid">
            <div class="visual-section" id="foto">
                <div class="top-gallery">
                    <div class="main-img" onclick="openLightbox(0)"><img src="foto1.webp"></div>
                    <div class="side-imgs">
                        <img src="foto2.webp" onclick="openLightbox(1)">
                        <img src="foto3.webp" onclick="openLightbox(2)">
                    </div>
                </div>
                <div class="thumb-row">
                    <img src="foto4.webp" onclick="openLightbox(3)">
                    <img src="foto5.webp" onclick="openLightbox(4)">
                    <img src="foto6.webp" onclick="openLightbox(5)">
                    <div class="material-card" style="display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="openLightbox(0)">
                        <span class="lang-txt" data-it="+20 FOTO" data-en="+20 PHOTOS">+20 FOTO</span>
                    </div>
                </div>
            </div>

            <aside class="desc-box material-card" id="info">
                <h2 class="lang-txt" data-it="L'Appartamento" data-en="The Apartment">L'Appartamento</h2>
                <div class="global-rating-box">
                    <span class="rating-num">5.0</span>
                    <div class="rating-stars">
                        <i class="fas fa-snowflake snowflake-gold"></i>
                        <i class="fas fa-snowflake snowflake-gold"></i>
                        <i class="fas fa-snowflake snowflake-gold"></i>
                        <i class="fas fa-snowflake snowflake-gold"></i>
                        <i class="fas fa-snowflake snowflake-gold"></i>
                    </div>
                    <span class="rating-count">(6 <span class="lang-txt" data-it="Recensioni" data-en="Reviews">Recensioni</span>)</span>
                </div>
                <p class="lang-txt" data-it="Ski-in Ski-out direttamente sulla Pista 16. Recentemente rinnovato, offre 6 posti letto in uno stile moderno e alpino." data-en="Ski-in Ski-out directly on Slope 16. Recently renovated, sleeps 6 in modern alpine style.">Ski-in Ski-out direttamente sulla Pista 16...</p>
            </aside>
        </div>

        <section id="recensioni" style="margin-top: 50px;">
            <h3 class="section-title lang-txt" data-it="Cosa dicono i nostri ospiti" data-en="Guest Reviews">Cosa dicono i nostri ospiti</h3>
            <div id="reviews-grid" class="reviews-container"></div>
        </section>
    </div>
</div>

<div id="lightbox">
    <span class="close-lb" onclick="closeLightbox()">&times;</span>
    <button class="lb-nav lb-prev" onclick="navigateLightbox(-1)">❮</button>
    <img id="lbImg">
    <button class="lb-nav lb-next" onclick="navigateLightbox(1)">❯</button>
</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
