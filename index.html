<!DOCTYPE html>
<html lang="it">
<head>
    <title>Cervinia Ski Home</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-wrapper">
    <header class="site-header">
        <div class="header-content">
            <h1>CERVINIA SKI HOME</h1>
            <p class="lang-txt" data-it="Il tuo rifugio moderno sulla Pista 16" data-en="Your modern retreat on Slope 16">Il tuo rifugio moderno sulla Pista 16</p>
        </div>
        <div class="lang-selector">
            <button id="btn-it" class="lang-flag-btn" onclick="setLanguage('it')">🇮🇹</button>
            <button id="btn-en" class="lang-flag-btn" onclick="setLanguage('en')">🇬🇧</button>
        </div>
    </header>

    <div class="container">
        <div class="booking-grid">
            <div class="visual-section" id="foto">
                <div class="top-gallery">
                    <div class="main-img" onclick="openLightbox(0)"><img src="foto1.webp"></div>
                    <div class="side-imgs">
                        <img src="foto2.webp" onclick="openLightbox(1)">
                        <img src="foto3.webp" onclick="openLightbox(2)">
                    </div>
                </div>
                <div class="thumb-row">
                    <img src="foto4.webp" onclick="openLightbox(3)">
                    <img src="foto5.webp" onclick="openLightbox(4)">
                    <img src="foto6.webp" onclick="openLightbox(5)">
                    <img src="foto7.webp" onclick="openLightbox(6)">
                    <div class="material-card" style="display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="openLightbox(0)">
                        <span class="lang-txt" data-it="+20 FOTO" data-en="+20 PHOTOS">+20 FOTO</span>
                    </div>
                </div>
            </div>

            <aside class="desc-box material-card">
                <h2 class="lang-txt" data-it="L'Appartamento" data-en="The Apartment">L'Appartamento</h2>
                
                <div class="global-rating-box">
                    <span class="rating-num">4.9</span>
                    <div class="rating-stars">
                        <i class="fas fa-snowflake snowflake-gold"></i>
                        <i class="fas fa-snowflake snowflake-gold"></i>
                        <i class="fas fa-snowflake snowflake-gold"></i>
                        <i class="fas fa-snowflake snowflake-gold"></i>
                        <i class="fas fa-snowflake snowflake-gold"></i>
                    </div>
                    <span class="rating-count">(24 <span class="lang-txt" data-it="Recensioni" data-en="Reviews">Recensioni</span>)</span>
                </div>

                <p class="lang-txt" data-it="Ski-in Ski-out direttamente sulla Pista 16. Recentemente rinnovato, offre 6 posti letto in uno stile moderno e alpino. Garage privato incluso." data-en="Ski-in Ski-out directly on Slope 16. Recently renovated, sleeps 6 in modern alpine style. Private garage included.">Ski-in Ski-out direttamente sulla Pista 16...</p>
                <div class="check-times"><b>In:</b> 16:00 | <b>Out:</b> 10:30</div>
            </aside>
        </div>

        <section id="recensioni" style="margin-top: 50px;">
            <h3 class="section-title lang-txt" data-it="Cosa dicono i nostri ospiti" data-en="Guest Reviews">Cosa dicono i nostri ospiti</h3>
            <div id="reviews-grid" class="reviews-container"></div>
        </section>
    </div>
</div>

<a href="recap.html" style="position:fixed; bottom:20px; right:20px; background:var(--accent); color:black; padding:15px 30px; border-radius:50px; font-weight:800; text-decoration:none; box-shadow:0 10px 30px rgba(0,229,255,0.4); z-index:1000;">
    <i class="fas fa-calendar-alt"></i> <span class="lang-txt" data-it="PRENOTA ORA" data-en="BOOK NOW">PRENOTA ORA</span>
</a>

<div id="lightbox" onclick="closeLightbox()"><img id="lbImg"></div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
