<!DOCTYPE html>
<html>
<head>
  <title>Cervinia Ski Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f7f7f7;
      color: #111;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lang {
      cursor: pointer;
      font-size: 14px;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #555;
    }

    .image {
      width: 100%;
      border-radius: 15px;
      margin: 20px 0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px 0;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .primary {
      background: black;
      color: white;
    }

    .secondary {
      background: white;
      border: 1px solid #ccc;
    }

    .section {
      margin-top: 40px;
      text-align: center;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <div><b>Cervinia Ski Home</b></div>
    <div class="lang" onclick="toggleLang()">IT / EN</div>
  </div>

  <div class="hero">
    <h1 id="title">Cervinia Ski Home</h1>
    <p id="desc">Appartamento moderno nel cuore di Cervinia, perfetto per sci e relax</p>
  </div>

  <img src="https://via.placeholder.com/1000x500" class="image">

  <div class="buttons">
    <a href="https://wa.me/393479612836">
      <button class="btn primary" id="wa">Contattami su WhatsApp</button>
    </a>

    <a href="mailto:airpulizie@gmail.com">
      <button class="btn secondary" id="mail">Invia Email</button>
    </a>

    <a href="https://instagram.com/cervinia_ski_house" target="_blank">
      <button class="btn secondary">Instagram</button>
    </a>
  </div>

  <div class="section">
    <h2 id="availTitle">Disponibilità</h2>
    <p id="availText">Contattami per verificare le date disponibili</p>
  </div>

  <!-- Calendario iCal -->
  <div class="section">
  <h2>Disponibilità</h2>
  <p>Contattami su WhatsApp per verificare le date disponibili in tempo reale</p>
</div>

</div>

<script>
  let lang = "it";

  function toggleLang() {
    if (lang === "it") {
      document.getElementById("desc").innerText = "Modern apartment in the heart of Cervinia, perfect for skiing and relaxation";
      document.getElementById("wa").innerText = "Contact me on WhatsApp";
      document.getElementById("mail").innerText = "Send Email";
      document.getElementById("availTitle").innerText = "Availability";
      document.getElementById("availText").innerText = "Contact me to check available dates";
      lang = "en";
    } else {
      document.getElementById("desc").innerText = "Appartamento moderno nel cuore di Cervinia, perfetto per sci e relax";
      document.getElementById("wa").innerText = "Contattami su WhatsApp";
      document.getElementById("mail").innerText = "Invia Email";
      document.getElementById("availTitle").innerText = "Disponibilità";
      document.getElementById("availText").innerText = "Contattami per verificare le date disponibili";
      lang = "it";
    }
  }
</script>

  
</html>
